services:
  agent-worker:
    build:
      context: ..
      dockerfile: .worker/Dockerfile.worker
    container_name: agent-worker
    restart: unless-stopped
    env_file:
      - ../.env
      - .env
    volumes:
      # Herda chaves SSH do host (apenas leitura)
      - ~/.ssh:/root/.ssh:ro
      # Herda autenticação do Gemini CLI
      - ~/.gemini:/root/.gemini:ro
      # Herda autenticação do GitHub CLI (gh)
      - ~/.config/gh:/root/.config/gh:ro
      # Encaminhamento do SSH Agent (para chaves com passphrase)
      - ${SSH_AUTH_SOCK}:/ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - GH_TOKEN=${GH_TOKEN}
      # Opcional: Se quiser sobrescrever a API Key via .env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    # Mantém o terminal interativo para visualização de logs coloridos
    tty: true
    stdin_open: true
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
